# 试管架逻辑布局（非固定物理坐标；坐标每次扫描由视觉重建）
# 命名：{side}.{row}{col}，统一小写，如 left.a1、right.b2

rows: 4
cols: 3
sides: ["left", "right"]

# 左架：列 3-2-1（从右到左），行 a-d（从上到下）
left_col_order: [3, 2, 1]
left_row_order: ["a", "b", "c", "d"]

# 右架：列 1-2-3，行 d-c-b-a 对应物理标签 D-C-B-A（从上到下）
right_col_order: [1, 2, 3]
right_row_order: ["d", "c", "b", "a"]

# 空槽 Z 估算（utils/rack_height.py 使用）
tube_above_rack_mm: 30        # 管口高出架面的估计高度，实测后调整
default_rack_plane_z_mm: null  # 无法从视觉估计时的兜底 Z，null 表示必须靠扫描

# 主配置文件

runtime:
  continuous_mode: true        # true=单次 move/dry-run/scan 连贯执行，不等待 Enter 确认

arm:
  ip: "192.168.1.18"
  port: 8080
  default_speed:   20       # SDK 速度单位，调试阶段先慢
  approach_speed: 15        # 靠近试管架时更慢

camera:
  serial: "CP84B4100090"
  width: 1280
  height: 720
  fps: 30
  depth_min_mm: 100
  depth_max_mm: 800

gripper:
  enabled: true              # false / --no-gripper：不连夹爪，抓放只走臂+视觉
  backend: "realman_sdk"     # realman_sdk：rm_set_rm_plus_mode + rm_set_gripper_position
  modbus_port: 1             # legacy_modbus 后端使用
  device_id: 1               # 夹爪 Modbus 从站地址，首次联调后按实际修改
  baudrate: 115200           # RM Plus 夹爪协议，见 grasp_demo/sdk_demo
  tool_voltage: 3            # 3 = 工具端 24V，夹爪上电必需
  full_stroke: 1000
  open_position: 120         # 通用张开位置；SDK 夹爪位置：0=全闭, 1000=全开
  pick_open_position: 135    # 抓取前张开，刚好套住试管
  grip_position: 110         # 抓取试管时夹住位置
  release_open_position: 135 # 放置时伸进孔后松开，提起时保持此开度
  close_position: 0          # SDK 夹爪位置：0 = 全闭；程序开始/任务结束归零
  zero_speed: 25600          # 寄存器 36：找零速度
  init_speed: 51200          # 寄存器 38：初始速度
  run_speed: 51200           # 寄存器 40：运行速度
  # 法兰 → 夹爪 TCP（指尖/抓取中心），末端坐标系下平移 mm；视觉 base_xyz 为 TCP 目标点
  tcp_offset_mm: [0, 0, 220]   # 法兰→夹爪 TCP（ee 系）；当前竖直姿态下应生成正的法兰 Z
  reg_zero_speed: 36
  reg_init_speed: 38
  reg_run_speed: 40
  reg_command: 43            # 写目标位置
  # reg_position_feedback:     # 若有位置反馈寄存器可取消注释
  modbus_timeout: 2            # rm_set_modbus_mode 超时，单位 100ms（三代机回退用）
  init_close_wait_s: 2.0       # 初始化闭合到默认态后等待
  position_reg_count: 2        # 位置占 2 个 16 位寄存器（32 位步数）
  move_timeout_s: 5.0
  settle_s: 0.3
  position_tolerance: 20       # legacy_modbus 反馈容差；SDK 后端通常无位置反馈

yolo:
  model_path: "data/models/best.pt"
  conf_threshold: 0.5
  iou_threshold: 0.45
  classes:
    0: empty
    1: tube

vision:
  refine_conf_threshold: 0.6   # 精定位时可比全局扫描更严
  refine_update_enabled: true  # true=抓取近距离 refine 成功后更新 base_xyz
  place_refine_update_enabled: true # true=放置前用近距离 empty 检测修正空槽 XY，Z 仍用 z_rack
  place_refine_fallback_to_global: true # 放置 refine 失败时回退第一次空槽坐标，避免夹着试管停在空中
  pick_refine_projected_fallback_enabled: true # 深度无效但第一次空间坐标投影匹配 YOLO 框时继续
  pick_refine_fallback_to_global: false # 二次检测完全无法确认时不直接信任第一次坐标
  pick_refine_projected_match_max_px: 80 # 第一次 base_xyz 投影点与 YOLO 框中心最大像素距离
  pick_refine_projected_bbox_margin_px: 20 # 投影点落在 YOLO 框附近时允许的像素边界余量
  display_enabled: true         # imshow 总开关
  live_preview_enabled: false  # 臂移动时 camera_live；现场优先保证 scan/refine 取流稳定
  scan_imshow_wait_ms: 0        # 0=按键继续，>0 自动停留毫秒
  refine_imshow_wait_ms: 0
  live_preview_fps: 15          # 臂移动时相机预览帧率（无 YOLO）
  font_scale: 0.28             

motion:
  approach_height_mm: 50       # 精定位前停在目标上方 5 cm
  refine_height_mm: 50         # 近距离视觉精定位高度；默认与 approach 一致
  pick_refine_height_mm: 80     # 抓取二次定位观察位：在抓取 approach 基础上上移 3cm
  pick_transit_z_mm: 330        # 空手去抓取时的横移高度
  use_direct_pick_transit: true # 抓取从高位直接到目标正上方，避免绕行 region 偏点
  pick_descend_mm: 30         # 从抓取 approach 高位向下探 30mm 后夹取
  pick_insert_mm: 5         # 旧接口保留：抓取下降深度，主流程优先用 pick_descend_mm
  pick_retreat_mm: 100         # 夹取后上提 10 cm
  place_approach_height_mm: 70 # 夹着 60mm 试管放置时，先让试管底端高出架面约 10mm
  place_descend_mm: 33         # 从放置 approach 竖直下探；当前比原先 27mm 加深 4mm
  place_insert_mm: 10          # 旧接口保留：放置插入深度，主流程优先用 place_descend_mm
  place_retreat_mm: 100        # 放置后上提高度
  use_lift_pose_for_place_transit: true  # 夹着试管去放置位时经 lift_pose 安全过渡
  place_carried_transit_z_mm: 330 # 夹持试管去放置目标正上方的法兰高位
  carried_clearance_z_mm: 368  # 夹持试管横移时的高位走廊 Z，防止试管碰撞

tube:
  length_mm: 60                # 试管长度
  tube_top_above_rack_mm: 22   # 试管盖/顶部高出试管架平台 2.2cm
  carried_extension_below_tcp_mm: 60 # 夹持后 TCP 下方额外伸出的试管长度，按整根试管保守计算
  rack_depth_mm: 30            # 试管架孔深
  place_depth_margin_mm: 5     # 放置下探相对孔深保留的安全余量
  place_bottom_clearance_mm: 10 # 放置 approach 时，试管底端高出架面的距离
  carried_obstacle_clearance_mm: 30 # 夹着试管横移时，试管底端高出其它试管顶部的距离

safety:
  min_place_approach_flange_z: 220
  min_place_insert_flange_z: 150
  max_tool_tilt_deg: 1        # 抓取/放置时工具 Z 轴相对竖直向下的最大倾角

poses:
  scan_pose: "config/poses/scan_pose.json"
  vertical_ee_pose: "config/poses/vertical.json"       # 抓取/精定位时的末端姿态参考
  left_region_pose: "config/poses/left_region.json"
  right_region_pose: "config/poses/right_region.json"
  lift_pose: "config/poses/lift_pose.json"             # 夹取或放置后提起

paths:
  transit_z_offset_mm: 80      # 路点中间抬高量

rack:
  rows: 4
  cols: 3
  sides: ["left", "right"]
  left_col_order: [3, 2, 1]    # 左架列：3 2 1（从右到左）
  right_col_order: [1, 2, 3]   # 右架列：1 2 3
  left_row_order: ["a", "b", "c", "d"]   # 上 → 下
  right_row_order: ["d", "c", "b", "a"]  # 对应物理 D,C,B,A

registry:
  slot_match_max_dist_mm: 15        # 精定位候选与预期槽 base_xy 最大平面偏差 (mm)
  refine_ambiguity_min_delta_mm: 2  # 最近/次近候选 dist_xy 最小差距，低于此报歧义；现场可试 5

verification:
  pick:
    rules:
      - slot: src
        expected: empty
        min_confidence: 0.0
  place:
    rules:
      - slot: dst
        expected: tube
        min_confidence: 0.0

# 标定文件路径（具体矩阵内容见对应 yaml）
calib:
  hand_eye: "config/hand_eye.yaml"
  camera_intrinsics: "config/camera_intrinsics.yaml"
  rack_layout: "config/rack_layout.yaml"
